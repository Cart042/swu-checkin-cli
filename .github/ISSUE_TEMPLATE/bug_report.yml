name: 问题反馈
description: 反馈运行失败、登录异常、推送异常或 Docker 部署问题。
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请说明你执行了什么命令、期望发生什么、实际发生什么。
      placeholder: 例如：docker compose run --rm swu-checkin 后登录失败。
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 运行环境
      placeholder: 例如：Ubuntu 22.04 / Docker Compose / Python 3.11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 关键日志
      description: 请先隐藏账号、密码、Token、机器人 Key 等敏感信息。
      render: text
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: 自查确认
      options:
        - label: 我已经运行过 `python check_in.py --check-config`
          required: false
        - label: 我已经隐藏日志中的账号、密码、Token 和机器人 Key
          required: true
