name: swu-check manual run

on:
  workflow_dispatch:
    inputs:
      login_method:
        description: "登录方式：browser 使用当前登录页；auto 会先尝试历史 direct；direct 目前多半不可用，仅保留诊断"
        required: true
        default: browser
        type: choice
        options:
          - direct
          - auto
          - browser

jobs:
  check-in:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      SWU_USERNAME: ${{ secrets.SWU_USERNAME }}
      SWU_PASSWORD: ${{ secrets.SWU_PASSWORD }}
      SWU_LOGIN_METHOD: ${{ inputs.login_method }}
      SWU_LOG_LEVEL: DEBUG
      SWU_DEBUG_DIR: debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare debug directory
        run: mkdir -p debug

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for browser fallback
        if: ${{ inputs.login_method != 'direct' }}
        run: playwright install chromium

      - name: Check configuration
        run: python check_in.py --check-config

      - name: Run check-in
        run: python -u check_in.py --no-lock

      - name: List debug files
        if: always()
        run: find debug -maxdepth 2 -type f -print || true

      - name: Upload login debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-debug
          path: debug/
          if-no-files-found: ignore
